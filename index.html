<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Web Viewer PWA</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#2563eb">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:system-ui,sans-serif;
    height:100vh;
    display:flex;
    flex-direction:column;
    background:#f4f4f4;
}

header{
    background:#2563eb;
    color:white;
    padding:12px;
}

.toolbar{
    display:flex;
    gap:8px;
    padding:10px;
    background:white;
    border-bottom:1px solid #ddd;
}

input{
    flex:1;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    padding:10px 14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#2563eb;
    color:white;
}

button:hover{
    opacity:.9;
}

iframe{
    flex:1;
    width:100%;
    border:none;
    background:white;
}

.status{
    background:#111827;
    color:white;
    padding:6px 10px;
    font-size:12px;
}
</style>
</head>
<body>

<header>
    <h2>Web Viewer PWA</h2>
</header>

<div class="toolbar">
    <button onclick="goBack()">◀</button>
    <button onclick="goForward()">▶</button>

    <input
        id="url"
        placeholder="Enter website URL..."
    >

    <button onclick="loadSite()">Go</button>
    <button onclick="reloadFrame()">↻</button>
    <button onclick="goHome()">Home</button>
</div>

<iframe id="viewer"></iframe>

<div class="status" id="status">
    Ready
</div>

<script>
const viewer = document.getElementById("viewer");
const urlInput = document.getElementById("url");
const status = document.getElementById("status");

let historyStack = [];
let currentIndex = -1;

function normalizeUrl(url){
    if(!url.startsWith("http://") &&
       !url.startsWith("https://")){
        url = "https://" + url;
    }
    return url;
}

function loadSite(push=true){

    let url = urlInput.value.trim();

    if(!url){
        return;
    }

    url = normalizeUrl(url);

    viewer.src = url;

    localStorage.setItem("lastUrl", url);

    if(push){

        historyStack =
            historyStack.slice(0,currentIndex+1);

        historyStack.push(url);

        currentIndex =
            historyStack.length - 1;
    }

    status.textContent = "Loading: " + url;
}

viewer.addEventListener("load",()=>{
    status.textContent =
        "Loaded (unless blocked by iframe policy)";
});

function reloadFrame(){
    viewer.src = viewer.src;
}

function goBack(){

    if(currentIndex > 0){

        currentIndex--;

        const url =
            historyStack[currentIndex];

        urlInput.value = url;

        loadSite(false);
    }
}

function goForward(){

    if(currentIndex <
       historyStack.length - 1){

        currentIndex++;

        const url =
            historyStack[currentIndex];

        urlInput.value = url;

        loadSite(false);
    }
}

function goHome(){

    urlInput.value =
        "https://example.com";

    loadSite();
}

const saved =
    localStorage.getItem("lastUrl");

if(saved){

    urlInput.value = saved;

    loadSite();
}

if("serviceWorker" in navigator){

    navigator.serviceWorker
        .register("service-worker.js")
        .then(()=>{
            console.log("SW Registered");
        });
}
</script>

</body>
</html>
